name: Release

on:
  push:
    tags:
      - 'client-v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write  # required for npm trusted publishing (OIDC) + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      # Trusted publishing (OIDC) needs npm >= 11.5.1; Node 22 ships npm 10.x,
      # which has no OIDC code path and silently falls back to token auth.
      - run: npm install -g npm@latest

      - run: npm install

      - run: npm run build

      - name: Publish (latest)
        run: npm publish --access public --provenance
